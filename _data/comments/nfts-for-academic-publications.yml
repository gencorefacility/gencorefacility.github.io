- author: "Mumin Ibrahim Tek"
  date: "2022-02-22"
  content: |
    <p>I am a new Ph.D. student (first year) from Turkey, and working on CRISPR plants. Nowadays we&#8217;re trying to send research papers to SCI index journals. Generally, the supervisor cares about journal charges. This week I and my friend (a Master&#8217;s Student) think to write a review about an interesting research area. Really we didn&#8217;t find a charge-free good quality journal for publishing. Charge costs can be normal for researchers from the EU, USA, or any developed country. I just take 200 dollars per month as a scholarship. When I think about this situation today, this idea came out to my mind; NFTs.  Finally, I saw this text, and actually, I am happier now. Because someone in the world thinks about new ways for the spreading of scientific studies equitable and less costly.</p>

- author: "Adrian Lynch"
  date: "2024-03-29"
  content: |
    <p>Thank you for taking the time to explore NFT integration with scientific research. In my opinion, Algorand would be the optimal Blockchain for this.</p>
    <p>The recent introduction of Python to the Algokit would give researchers of all fields an opportunity to levy new digital tools.</p>
