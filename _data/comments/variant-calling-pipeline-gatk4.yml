- author: "Harish"
  date: "2021-07-09"
  content: |
    <p>Hi! Thanks for the pipeline. It was a good step for me to start learning Nextflow! </p>
    <p>What I was wondering is, how do you cache the results from MarkDuplicates? Everytime the pipeline fails, I need to start from Marking the duplicates.</p>
  replies:
    - author: "Mohammed Khalfan"
      date: "2021-12-08"
      content: |
        <p>You would need to *delete* the lines (not comment out) where you make the temp directory and remove it (first and last lines in the process), and remove the parameter that tells GATK to use the tmpdir. The use of a temporary directory, and the way it is named when created, results in the underlying code being different every time the script it run and this causes the pipeline to resume from the step. The temporary directory was introduced originally because the compute nodes where the processes run were running out of space when working with larger datasets.</p>

