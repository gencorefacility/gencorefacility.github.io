- author: "Niyomi"
  date: "2020-09-01"
  content: |
    <p>Is this pipeline for an individual sample?  I don't see any merging steps anywhere. At what point should I merge the samples if I were to use this? BAM files or the VCF's?</p>
  replies:
    - author: "Mohammed Khalfan"
      date: "2020-09-02"
      content: |
        <p>Hi Niyomi,</p>
        <p>This pipeline operates HaplotypeCaller in its default mode on a single sample. If you would like to do joint genotyping for multiple samples, the pipeline is a little different. You would need to add the <code>-ERC GVCF</code> option to HaplotypeCaller to generate an intermediate GVCF, and then run gatk GenotypeGVCFs using the intermediary GVCFs as input.</p>

- author: "Niyomi"
  date: "2020-09-03"
  content: |
    <p>Thank you for your reply. Yes, I am familiar with the -ERC GVCF. My question is, do you use this pipeline to process each sample individually or do you merge samples at any point? In other words, do I follow this pipeline 250 times for 250 samples? Thank you in advance.</p>
  replies:
    - author: "Mohammed Khalfan"
      date: "2020-09-10"
      content: |
        <p>This pipeline operates on each sample individually, it does not merge samples at any point, so yes you would follow the pipeline 250 times for 250 samples. The nextflow script takes care of this.</p>
