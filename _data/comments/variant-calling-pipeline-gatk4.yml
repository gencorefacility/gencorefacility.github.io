- author: "Eric Borenstein"
  date: "2020-04-03"
  content: |
    <p>This workflow can also be ran as an SBATCH rather than interactively. The SBATCH options to change would be job-name, output, and possibly time. The resources set in SBATCH are only for the job controller nextflow and not the actual compute, so no need to increase. The resources for your compute would be set in the config file given.  Job process can be monitored in the slurm output file you set.</p>
    <p>#!/bin/bash</p>
    <p>#SBATCH &#8211;nodes=1<br />
    #SBATCH &#8211;ntasks-per-node=1<br />
    #SBATCH &#8211;cpus-per-task=2<br />
    #SBATCH &#8211;time=5:00:00<br />
    #SBATCH &#8211;mem=2GB<br />
    #SBATCH &#8211;job-name=myJob<br />
    #SBATCH &#8211;output=slurm_%j.out<br />
    module purge<br />
    module load nextflow/20.10.0</p>
    <p>nextflow run main.nf -c your.config</p>

