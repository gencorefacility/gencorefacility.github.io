---
layout: default
---

{% include page-header.html %}
<div class="page-content">
  <article class="content-card post-article">
    <div class="post-header">
      <h1>{{ page.title }}</h1>
      <p class="post-meta">
        {{ page.date | date: "%B %-d, %Y" }}
        {% if page.author %} &middot; by {{ page.author }}{% endif %}
      </p>
    </div>
    <div class="post-body">
      {{ content }}
    </div>
    {% if page.comments %}
    {% include comments.html %}
    {% endif %}
  </article>
</div>
